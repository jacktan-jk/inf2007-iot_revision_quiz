    button.secondary { background: #111827; color: white; border-color: #111827; }

    .qtitle { font-weight: 700; margin: 0; }
    .badge { font-size: 12px; color: #374151; background: var(--soft); border: 1px solid var(--border); padding: 2px 8px; border-radius: 999px; white-space: nowrap; }
    .badge.multi { color: #1d4ed8; background: #dbeafe; border-color: #bfdbfe; }
    .badge.reveal { color: #7c2d12; background: #ffedd5; border-color: #fed7aa; }
    .prompt-blocks { display: grid; gap: 8px; margin-bottom: 10px; }
    .prompt-group { margin: 0; padding-left: 18px; color: #374151; }
    .prompt-group li { margin: 4px 0; }
    .opts { display: grid; gap: 8px; margin-top: 8px; }
    .opt { display: flex; gap: 10px; align-items: flex-start; padding: 10px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); cursor: pointer; }
    .opt:hover { border-color: #c7d2fe; }
    .opt.selected { border-color: var(--pick); background: var(--pick-bg); }
    .opt.correct { border-color: var(--good); background: var(--good-bg); }
    .opt.wrong { border-color: var(--bad); background: var(--bad-bg); }
    .opt.disabled { pointer-events: none; opacity: .85; }
    .letter { width: 28px; height: 28px; border-radius: 999px; border: 1px solid var(--border); display: grid; place-items: center; font-weight: 700; background: white; flex: 0 0 auto; }
    .opt.selected .letter { border-color: var(--pick); color: var(--pick); }
    .opt.correct .letter { border-color: var(--good); color: var(--good); }
    .opt.wrong .letter { border-color: var(--bad); color: var(--bad); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .answer { margin-top: 12px; border-top: 1px dashed var(--border); padding-top: 12px; color: #111827; }
    .answer[hidden] { display: none; }
    .answer strong { color: #065f46; }
    .answer p { margin: 8px 0 0; color: #1f2937; }
    footer { text-align: center; color: var(--muted); padding: 30px 12px; }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function shuffle(list) {
      const copy = [...list];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function escapeHtmlClient(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatText(text) {
      return escapeHtmlClient(text).replace(/\n/g, '<br>');
    }

    function cleanDisplayText(text) {
      return String(text || '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function extractAnswerNote(answer) {
      const text = String(answer || '').trim();
      if (!text) {
        return { main: '', note: '' };
      }

      const match = text.match(/^(.*?)(?:\s*\((?:Note:\s*)?(.*)\))\s*$/);
      if (!match) {
        return { main: cleanDisplayText(text), note: '' };
      }

      return {
        main: cleanDisplayText(match[1]),
        note: cleanDisplayText(match[2]),
      };
    }

    function getCorrectTexts(item) {
      if (Array.isArray(item.correct) && Array.isArray(item.options) && item.correct.length > 0 && item.options.length > 0) {
        return item.correct
          .map((index) => cleanDisplayText(item.options[index]))
          .filter(Boolean);
      }

      const info = extractAnswerNote(item.answer);
      if (!info.main) {
        return [];
      }

      const lines = info.main.split(/\n+/).map(cleanDisplayText).filter(Boolean);
      if (lines.length > 1) {
        return lines;
      }

      return [info.main];
    }

    function formatQuotedList(values) {
      const items = values.map((value) => `"${cleanDisplayText(value)}"`).filter(Boolean);
      if (items.length === 0) {
        return 'the correct option';
      }
      if (items.length === 1) {
        return items[0];
      }
      if (items.length === 2) {
        return `${items[0]} and ${items[1]}`;
      }
      return `${items.slice(0, -1).join(', ')}, and ${items[items.length - 1]}`;
    }

    function trimSentence(text) {
      return cleanDisplayText(text).replace(/[.]+$/, '');
    }

    function normalizeExplanationText(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/802\.11ah/g, ' 80211ah halow ')
        .replace(/802\.15\.4/g, ' 802154 ')
        .replace(/6lo?wpan/g, ' 6lowpan ')
        .replace(/wi-?fi/g, ' wifi ')
        .replace(/bluetooth low energy/g, ' ble ')
        .replace(/\bble\b/g, ' ble ')
        .replace(/response indication deferral/g, ' rid ')
        .replace(/traffic indication map/g, ' tim ')
        .replace(/request to send/g, ' rts ')
        .replace(/clear to send/g, ' cts ')
        .replace(/non-?ip data delivery/g, ' nidd ')
        .replace(/service capability exposure function/g, ' scef ')
        .replace(/generic attribute profile/g, ' gatt ')
        .replace(/chirp spread spectrum/g, ' css ')
        .replace(/physical resource block/g, ' prb ')
        .replace(/power save mode/g, ' powersave ')
        .replace(/router eligible end device/g, ' reed ')
        .replace(/scatter\s*net/g, ' scatternet ')
        .replace(/2\.4\s*ghz/g, ' 24ghz ')
        .replace(/5\s*ghz/g, ' 5ghz ')
        .replace(/sub[- ]*1\s*ghz/g, ' sub1ghz ')
        .replace(/923\s*mhz/g, ' 923mhz ')
        .replace(/915\s*mhz/g, ' 915mhz ')
        .replace(/868\s*mhz/g, ' 868mhz ')
        .replace(/[^a-z0-9]+/g, ' ')
        .trim();
    }

    function tokenizeExplanation(text) {
      const normalized = normalizeExplanationText(text);
      if (!normalized) {
        return [];
      }

      return normalized
        .split(/\s+/)
        .filter((token) => token && !EXPLANATION_STOPWORDS.has(token))
        .filter((token) => token.length > 1 || /\d/.test(token));
    }

    function joinExplanationFacts(facts) {
      return facts
        .map((fact) => cleanDisplayText(fact))
        .filter(Boolean)
        .map((fact) => fact.endsWith('.') ? fact : `${fact}.`)
        .join(' ');
    }

    function pickExplanationFacts(item, correctTexts) {
      const facts = LECTURE_FACTS[item.lectureNumber] || [];
      if (facts.length === 0) {
        return [];
      }

      const promptTokens = new Set(tokenizeExplanation(item.prompt));
      const answerPhrases = correctTexts.map((text) => normalizeExplanationText(text)).filter(Boolean);
      const answerTokens = new Set(answerPhrases.flatMap((phrase) => phrase.split(/\s+/).filter(Boolean)));

      const ranked = facts
        .map((fact) => {
          const factNormalized = normalizeExplanationText(fact);
          const factTokens = new Set(factNormalized.split(/\s+/).filter(Boolean));
          let score = 0;
          let promptHits = 0;
          let answerHits = 0;

          promptTokens.forEach((token) => {
            if (factTokens.has(token)) {
              score += 2;
              promptHits += 1;
            }
          });

          answerTokens.forEach((token) => {
            if (factTokens.has(token)) {
              score += 4;
              answerHits += 1;
            }
          });

          answerPhrases.forEach((phrase) => {
            if (phrase.length > 2 && factNormalized.includes(phrase)) {
              score += 6;
              answerHits += 2;
            }
          });

          return { fact, score, promptHits, answerHits };
        })
        .filter((entry) => entry.score >= 4)
        .sort((left, right) => right.score - left.score || right.answerHits - left.answerHits || right.promptHits - left.promptHits);

      if (ranked.length === 0) {
        return [];
      }

      const chosen = [ranked[0].fact];
      if (ranked[1] && ranked[1].score >= Math.max(4, ranked[0].score - 2)) {
        chosen.push(ranked[1].fact);
      }
      return chosen;
    }

    function buildNoteBackedExplanation(item, answerInfo, subject, correctTexts) {
      if (EXPLANATION_OVERRIDES[item.id]) {
        return EXPLANATION_OVERRIDES[item.id]({ item, answerInfo, correctTexts, subject });
      }

      const facts = pickExplanationFacts(item, correctTexts);
      const prompt = String(item.prompt || '').toLowerCase();
      const factsText = joinExplanationFacts(facts);

      if (!factsText) {
        return '';
      }

      if (/all of the above/i.test(answerInfo.main)) {
        return `"All of the above" is correct because ${factsText} Each listed option fits that description.`;
      }

      if (/none of the above/i.test(answerInfo.main)) {
        return `"${answerInfo.main}" is correct because ${factsText} The listed options do not match that description.`;
      }

      if (/^true$/i.test(answerInfo.main)) {
        return `"True" is correct because ${factsText}`;
      }

      if (/^false$/i.test(answerInfo.main)) {
        return `"False" is correct because ${factsText} The statement in the prompt conflicts with that description.`;
      }

      if (item.kind === 'multi' && /\bnot\b|\bfalse\b/.test(prompt)) {
        return `${subject} are correct because ${factsText} Those are the choices that fall outside the category named in the prompt.`;
      }

      if (item.kind !== 'multi' && /\bnot\b|\bfalse\b/.test(prompt)) {
        return `${subject} is correct because ${factsText} That makes it the choice that does not fit the category named in the question.`;
      }

      if (item.kind === 'multi') {
        return `${subject} are correct because ${factsText}`;
      }

      return `${subject} is correct because ${factsText}`;
    }

    function buildCalculationExplanation(item, correctTexts) {
      const prompt = String(item.prompt || '');

      if (match) {

    function buildExplanation(item) {
      const prompt = String(item.prompt || '').trim();

        return `"All of the above" is correct because each listed option matches the concept breakdown used in this topic, so none of the choices has to be excluded.`;

        return `"${answerInfo.main}" is correct because the lecture's definition of this topic does not line up with any of the listed choices.`;
      }

      if (/true|false/i.test(answerInfo.main) && Array.isArray(item.options) && item.options.length === 2) {
        return `${subject} ${verb} correct because the statement ${/false/i.test(answerInfo.main) ? 'conflicts with' : 'matches'} the way this concept is defined in the course material.`;
      }

      if (/match|pair/i.test(prompt)) {
        return `${subject} ${verb} correct because those pairings keep each term aligned with its actual definition, role, or category.`;
      }

      if (/arrange|order|sequence/i.test(prompt)) {
        return `${subject} ${verb} correct because that ordering preserves the layer or process sequence used in the lecture.`;
      }

      if (/which frequency|which band|operate on/i.test(prompt)) {
        return `${subject} ${verb} correct because ${correctTexts.length > 1 ? 'those are the frequency bands' : 'that is the frequency band'} associated with the technology in this topic.`;
      }

      if (/role|purpose|primary role|what does .* do/i.test(prompt.toLowerCase())) {
        return `${subject} ${verb} correct because ${correctTexts.length > 1 ? 'those options match the role split' : 'it matches the role'} used by the protocol or architecture, while the other choices describe different functions.`;
      }

      if (item.kind === 'multi') {
        return `${subject} are correct because they belong to the concept group being tested, while the remaining options fall into a different role, layer, or behavior.`;
      }

      return `${subject} is correct because it matches the protocol behavior, architectural role, or technical property being tested here.`;
    }

    function buildExplanationHtml(item) {
      return `<strong>Explanation:</strong><p>${formatText(buildExplanation(item))}</p>`;
    }

    function buildQuestions() {
      return shuffle(QUIZ_DATA.questions).map((question) => {
        const item = clone(question);
        item.__answered = false;
        item.__selected = [];

        if (item.kind !== 'reveal' && item.shuffleOptions) {
          const shuffledOptions = shuffle(
            item.options.map((text, index) => ({
              text,
              isCorrect: item.correct.includes(index),
            })),
          );

          item.options = shuffledOptions.map((option) => option.text);
          item.correct = shuffledOptions
            .map((option, index) => option.isCorrect ? index : -1)
            .filter((index) => index >= 0);
        }

        return item;
      });
    }

    function markCompleted(item) {
      if (!item.__answered) {
        item.__answered = true;
        state.completed += 1;
      }
    }

    function getGradableCount() {
      return currentQuestions.filter((question) => question.kind !== 'reveal').length;
    }

    function updateStats() {
      const gradableCount = getGradableCount();
      scoreEl.textContent = `Score: ${state.score} / ${gradableCount}`;
      progressEl.textContent = `Completed: ${state.completed} / ${currentQuestions.length}`;
      const percent = gradableCount ? Math.round((state.score / gradableCount) * 100) : 0;
      percentEl.textContent = `${percent}%`;
    }

    function normalizeComparableText(text) {
      return String(text || '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isDuplicateOptionBlock(item, lines) {
      if (item.kind === 'reveal' || !Array.isArray(item.options)) {
        return false;
      }

      if (lines.length !== item.options.length) {
        return false;
      }

      return lines.every((line, index) => (
        normalizeComparableText(line) === normalizeComparableText(item.options[index])
      ));
    }

    function createPromptBlocks(item) {
      const wrapper = document.createElement('div');
      wrapper.className = 'prompt-blocks';

      return wrapper;
    }

    function revealAnswer(card, item) {
      const answer = card.querySelector('.answer');
      answer.innerHTML = buildExplanationHtml(item);
      answer.hidden = false;
      markCompleted(item);
      updateStats();
    }

    function finalizeSingle(card, item, pickedIndex) {
      if (item.__answered) {
        return;
      }

      const optionNodes = card.querySelectorAll('.opt');
      optionNodes.forEach((node) => node.classList.add('disabled'));
      markCompleted(item);

      if (item.correct.includes(pickedIndex)) {
        optionNodes[pickedIndex].classList.add('correct');
        state.score += 1;
      } else {
        optionNodes[pickedIndex].classList.add('wrong');
        item.correct.forEach((index) => optionNodes[index].classList.add('correct'));
      }

      revealAnswer(card, item);
    }

    function toggleMulti(card, item, optionIndex) {
      if (item.__answered) {
        return;
      }

      const optionNodes = card.querySelectorAll('.opt');
      const selected = new Set(item.__selected);
      if (selected.has(optionIndex)) {
        selected.delete(optionIndex);
      } else {
        selected.add(optionIndex);
      }

      item.__selected = [...selected].sort((left, right) => left - right);
      optionNodes.forEach((node, index) => {
        node.classList.toggle('selected', selected.has(index));
      });

      const submitBtn = card.querySelector('[data-role="submit-multi"]');
      submitBtn.disabled = item.__selected.length === 0;
    }

    function finalizeMulti(card, item) {
      if (item.__answered || item.__selected.length === 0) {
        return;
      }

      const optionNodes = card.querySelectorAll('.opt');
      const correct = new Set(item.correct);
      const selected = new Set(item.__selected);

      optionNodes.forEach((node, index) => {
        node.classList.add('disabled');
        if (correct.has(index)) {
          node.classList.add('correct');
        }
        if (selected.has(index) && !correct.has(index)) {
          node.classList.add('wrong');
        }
      });

      const isExactMatch =
        item.__selected.length === item.correct.length
        && item.__selected.every((value, index) => value === item.correct[index]);

      markCompleted(item);
      if (isExactMatch) {
        state.score += 1;
      }

      revealAnswer(card, item);
    }

    function renderQuestion(item, questionIndex) {
      const card = document.createElement('section');
      card.className = 'qcard';

      const head = document.createElement('div');
      head.className = 'qhead';

      const title = document.createElement('p');
      title.className = 'qtitle';
      title.innerHTML = `${questionIndex + 1}. ${formatText(item.prompt)}`;

      const badgeWrap = document.createElement('div');
      badgeWrap.style.display = 'flex';
      badgeWrap.style.gap = '6px';
      badgeWrap.style.flexWrap = 'wrap';

      const lectureBadge = document.createElement('span');
      lectureBadge.className = 'badge';
      lectureBadge.textContent = `Lecture ${item.lectureNumber}`;

      const typeBadge = document.createElement('span');
      typeBadge.className = 'badge';
      if (item.kind === 'multi') {
        typeBadge.classList.add('multi');
        typeBadge.textContent = 'Multi-select';
      } else if (item.kind === 'reveal') {
        typeBadge.classList.add('reveal');
        typeBadge.textContent = 'Reveal answer';
      } else {
        typeBadge.textContent = 'Single answer';
      }

      badgeWrap.appendChild(lectureBadge);
      badgeWrap.appendChild(typeBadge);
      head.appendChild(title);
      head.appendChild(badgeWrap);
      card.appendChild(head);

      const lectureMeta = document.createElement('p');
      lectureMeta.style.margin = '0 0 10px';
      lectureMeta.style.color = '#6b7280';
      lectureMeta.style.fontSize = '13px';
      lectureMeta.textContent = item.lectureTitle;
      card.appendChild(lectureMeta);

      if (item.detailBlocks.length > 0) {
        const promptBlocks = createPromptBlocks(item);
        if (promptBlocks.childElementCount > 0) {
          card.appendChild(promptBlocks);
        }
      }

      if (item.kind !== 'reveal') {
        const optionsEl = document.createElement('div');
        optionsEl.className = 'opts';

        item.options.forEach((option, optionIndex) => {
          const row = document.createElement('div');
          row.className = 'opt';
          row.setAttribute('data-q', String(questionIndex));
          row.setAttribute('data-o', String(optionIndex));

          const letter = document.createElement('div');
          letter.className = 'letter';
          letter.textContent = String.fromCharCode(65 + optionIndex);

          const text = document.createElement('span');
          text.innerHTML = formatText(option);

          row.appendChild(letter);
          row.appendChild(text);

          if (item.kind === 'single') {
            row.addEventListener('click', () => finalizeSingle(card, item, optionIndex));
          } else {
            row.addEventListener('click', () => toggleMulti(card, item, optionIndex));
          }

          optionsEl.appendChild(row);
        });

        card.appendChild(optionsEl);
      }

      const actions = document.createElement('div');
      actions.className = 'actions';

      if (item.kind === 'multi') {
        const submitBtn = document.createElement('button');
        submitBtn.type = 'button';
        submitBtn.className = 'secondary';
        submitBtn.textContent = 'Check answer';
        submitBtn.disabled = true;
        submitBtn.setAttribute('data-role', 'submit-multi');
        submitBtn.addEventListener('click', () => finalizeMulti(card, item));
        actions.appendChild(submitBtn);
      }

      if (item.kind === 'reveal') {
        const revealBtn = document.createElement('button');
        revealBtn.type = 'button';
        revealBtn.className = 'secondary';
        revealBtn.textContent = 'Reveal answer';
        revealBtn.addEventListener('click', () => {
          revealBtn.disabled = true;
          revealAnswer(card, item);
        });
        actions.appendChild(revealBtn);
      }

      if (actions.childElementCount > 0) {
        card.appendChild(actions);
      }

      const answer = document.createElement('div');
      answer.className = 'answer';
      answer.hidden = true;
      card.appendChild(answer);

      return card;
    }

    function render() {
      quizEl.innerHTML = '';
      currentQuestions.forEach((item, questionIndex) => {
        quizEl.appendChild(renderQuestion(item, questionIndex));
      });
      updateStats();
    }

    function resetQuiz() {
      state.score = 0;
      state.completed = 0;
      currentQuestions.forEach((item) => {
        item.__answered = false;
        item.__selected = [];
      });
      render();
    }

    function revealAll() {
      document.querySelectorAll('.qcard').forEach((card, index) => {
        const item = currentQuestions[index];

        if (item.kind === 'single') {
          const optionNodes = card.querySelectorAll('.opt');
          optionNodes.forEach((node, optionIndex) => {
            node.classList.add('disabled');
            if (item.correct.includes(optionIndex)) {
              node.classList.add('correct');
            }
          });
          markCompleted(item);
        } else if (item.kind === 'multi') {
          const optionNodes = card.querySelectorAll('.opt');
          optionNodes.forEach((node, optionIndex) => {
            node.classList.add('disabled');
            node.classList.remove('selected', 'wrong');
            if (item.correct.includes(optionIndex)) {
              node.classList.add('correct');
            }
          });
          const submitBtn = card.querySelector('[data-role="submit-multi"]');
          if (submitBtn) {
            submitBtn.disabled = true;
          }
          markCompleted(item);
        } else {
          const button = card.querySelector('.actions button');
          if (button) {
            button.disabled = true;
          }
        }

        const answer = card.querySelector('.answer');
        answer.innerHTML = buildExplanationHtml(item);
        answer.hidden = false;
      });

      updateStats();
    }

    function shuffleQuiz() {
      state.score = 0;
      state.completed = 0;
      currentQuestions = buildQuestions();
      render();
    }

    resetBtn.addEventListener('click', resetQuiz);
    revealBtn.addEventListener('click', revealAll);
    shuffleBtn.addEventListener('click', shuffleQuiz);

    currentQuestions = buildQuestions();
    render();
  </script>
</body>
</html>
