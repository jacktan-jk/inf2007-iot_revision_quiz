        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
      }
      return copy;
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function escapeHtmlClient(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function buildQuestions() {
      return shuffle(QUESTIONS).map((question) => {
        const item = clone(question);
        item.kind = item.correct.length > 1 ? "multi" : "single";
        item.__answered = false;
        item.__selected = [];
        const shuffledOptions = shuffle(
          item.options.map((text, index) => ({
            text,
            isCorrect: item.correct.includes(index),
          })),
        );
        item.options = shuffledOptions.map((entry) => entry.text);
        item.correct = shuffledOptions
          .map((entry, index) => entry.isCorrect ? index : -1)
          .filter((index) => index >= 0);
        return item;
      });
    }

    function updateStats() {
      scoreEl.textContent = `Score: ${state.score} / ${currentQuestions.length}`;
      progressEl.textContent = `Answered: ${state.answered} / ${currentQuestions.length}`;
      const pct = currentQuestions.length ? Math.round((state.score / currentQuestions.length) * 100) : 0;
      percentEl.textContent = `${pct}%`;
    }

    function revealExplanation(card, item) {
      const exp = card.querySelector(".exp");
      exp.hidden = false;
      exp.innerHTML = `<strong>Explanation:</strong> ${escapeHtmlClient(item.why)}`;
    }

    function markAnswered(item) {
      if (!item.__answered) {
        item.__answered = true;
        state.answered += 1;
      }
    }

    function onChooseSingle(card, item, pickedIndex) {
      if (item.__answered) return;
      const nodes = card.querySelectorAll(".opt");
      nodes.forEach((node) => node.classList.add("disabled"));
      markAnswered(item);
      if (item.correct.includes(pickedIndex)) {
        nodes[pickedIndex].classList.add("correct");
        state.score += 1;
      } else {
        nodes[pickedIndex].classList.add("wrong");
        item.correct.forEach((index) => nodes[index].classList.add("correct"));
      }
      revealExplanation(card, item);
      updateStats();
    }

    function toggleMulti(card, item, optionIndex) {
      if (item.__answered) return;
      const picked = new Set(item.__selected);
      if (picked.has(optionIndex)) picked.delete(optionIndex);
      else picked.add(optionIndex);
      item.__selected = [...picked].sort((left, right) => left - right);
      const nodes = card.querySelectorAll(".opt");
      nodes.forEach((node, index) => node.classList.toggle("selected", picked.has(index)));
      card.querySelector("[data-role='submit-multi']").disabled = item.__selected.length === 0;
    }

    function onSubmitMulti(card, item) {
      if (item.__answered || item.__selected.length === 0) return;
      const nodes = card.querySelectorAll(".opt");
      const selected = new Set(item.__selected);
      const correct = new Set(item.correct);
      nodes.forEach((node, index) => {
        node.classList.add("disabled");
        if (correct.has(index)) node.classList.add("correct");
        if (selected.has(index) && !correct.has(index)) node.classList.add("wrong");
      });
      const exactMatch =
        item.__selected.length === item.correct.length &&
        item.__selected.every((value, index) => value === item.correct[index]);
      markAnswered(item);
      if (exactMatch) state.score += 1;
      revealExplanation(card, item);
      updateStats();
    }

    function render() {
      quizEl.innerHTML = "";
      currentQuestions.forEach((item, qIndex) => {
        const card = document.createElement("section");
        card.className = "qcard";

        const head = document.createElement("div");
        head.className = "qhead";

        const title = document.createElement("p");
        title.className = "qtitle";
        title.textContent = `${qIndex + 1}. ${item.q}`;

        const badge = document.createElement("span");
        badge.className = "badge";
        if (item.kind === "multi") {
          badge.classList.add("multi");
          badge.textContent = "Multi-select";
        } else {
          badge.textContent = "Single answer";
        }

        head.appendChild(title);
        head.appendChild(badge);
        card.appendChild(head);

        const opts = document.createElement("div");
        opts.className = "opts";
        item.options.forEach((option, optionIndex) => {
          const row = document.createElement("div");
          row.className = "opt";
          const letter = document.createElement("div");
          letter.className = "letter";
          letter.textContent = String.fromCharCode(65 + optionIndex);
          const text = document.createElement("span");
          text.textContent = option;
          row.appendChild(letter);
          row.appendChild(text);
          if (item.kind === "multi") row.addEventListener("click", () => toggleMulti(card, item, optionIndex));
          else row.addEventListener("click", () => onChooseSingle(card, item, optionIndex));
          opts.appendChild(row);
        });
        card.appendChild(opts);

        if (item.kind === "multi") {
          const actions = document.createElement("div");
          actions.className = "actions";
          const submit = document.createElement("button");
          submit.type = "button";
          submit.className = "secondary";
          submit.textContent = "Check answer";
          submit.disabled = true;
          submit.setAttribute("data-role", "submit-multi");
          submit.addEventListener("click", () => onSubmitMulti(card, item));
          actions.appendChild(submit);
          card.appendChild(actions);
        }

        const exp = document.createElement("div");
        exp.className = "exp";
        exp.hidden = true;
        card.appendChild(exp);
        quizEl.appendChild(card);
      });
      updateStats();
    }

    function revealAll() {
      document.querySelectorAll(".qcard").forEach((card, index) => {
        const item = currentQuestions[index];
        const nodes = card.querySelectorAll(".opt");
        nodes.forEach((node, optionIndex) => {
          node.classList.add("disabled");
          if (item.correct.includes(optionIndex)) node.classList.add("correct");
        });
        markAnswered(item);
        const submit = card.querySelector("[data-role='submit-multi']");
        if (submit) submit.disabled = true;
        revealExplanation(card, item);
      });
      updateStats();
    }

    function resetQuiz() {
      state = { score: 0, answered: 0 };
      render();
    }

    function shuffleQuiz() {
      state = { score: 0, answered: 0 };
      currentQuestions = buildQuestions();
      render();
    }

    resetBtn.addEventListener("click", resetQuiz);
    revealBtn.addEventListener("click", revealAll);
    shuffleBtn.addEventListener("click", shuffleQuiz);
    currentQuestions = buildQuestions();
    render();
  </script>
</body>
</html>
