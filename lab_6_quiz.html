<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSC2106 – Lab 6 MCQ Quiz: BLE Pico W MicroPython</title>
  <style>
    :root { --maxw: 980px; --accent: #0f766e; --muted:#6b7280; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial,
    "Noto Sans", sans-serif; line-height: 1.45; margin: 0; background: #f7f7f8;
    color:#111827; }
    header { background: white; border-bottom: 1px solid #e5e7eb; }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 18px 16px; }
    h1 { font-size: clamp(20px, 2.6vw, 28px); margin: 0 0 6px; }
    .sub { color: var(--muted); font-size: 14px; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px }
    button { cursor:pointer; border:1px solid #e5e7eb; background:white;
    padding:8px 12px; border-radius:10px; font-weight:600; }
    button.primary { background: var(--accent); color: white; border-color:
    var(--accent); }
    button:disabled { opacity:.6; cursor:not-allowed }
    .stats { display:flex; gap:18px; align-items:center; margin-top:10px; }
    .pill { background:#eef2ff; color:#3730a3; font-weight:700; padding:6px
    10px; border-radius:999px; }
    main { max-width: var(--maxw); margin: 12px auto 60px; padding: 0 16px; }
    .qcard { background:white; border:1px solid #e5e7eb; border-radius:14px;
    padding:14px; margin:14px 0; box-shadow: 0 1px 0 rgba(0,0,0,.03); }
    .qhead { display:flex; justify-content:space-between; align-items:baseline;
    gap:6px }
    .qtitle { font-weight:700; margin:0 0 8px }
    .badge { font-size:12px; color:#374151; background:#f3f4f6; border:1px
    solid #e5e7eb; padding:2px 8px; border-radius:999px }
    .opts { display:grid; gap:8px; margin-top:8px }
    .opt { display:flex; gap:10px; align-items:flex-start; padding:10px;
    border:1px solid #e5e7eb; border-radius:12px; background:white; cursor:pointer; }
    .opt:hover { border-color:#c7d2fe; }
    .opt.correct { border-color:#16a34a; background:#f0fdf4; }
    .opt.wrong { border-color:#dc2626; background:#fef2f2; }
    .opt.disabled { pointer-events:none; opacity:.8 }
    .letter { width:28px; height:28px; border-radius:999px; border:1px
    solid #e5e7eb; display:grid; place-items:center; font-weight:700; }
    .exp { margin-top:10px; border-top:1px dashed #e5e7eb; padding-top:10px;
    color:#111827; }
    .exp strong { color:#065f46 }
    pre.code-block {
      background-color: #1e293b;
      color: #f8fafc;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      margin: 12px 0;
    }
    footer { text-align:center; color:#6b7280; padding:30px 12px; }
    details > summary { cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>CSC2106 – Lab 6 MCQ Quiz: BLE Pico W MicroPython</h1>
      <div class="sub">CSC2106 – Internet of Things: Protocols and Networks • Lab 6</div>
      <div class="stats" id="stats">
        <span class="pill" id="score">Score: 0</span>
        <span class="pill" id="progress">Answered: 0 / 0</span>
        <span class="pill" id="percent">0%</span>
      </div>
      <div class="controls">
        <button class="primary" id="resetBtn" title="Reset the quiz to try again">Reset quiz</button>
        <button id="revealBtn" title="Reveal correct answers for all questions">Reveal all answers</button>
        <button id="shuffleBtn" title="Shuffle questions and answer options">Shuffle</button>
      </div>
    </div>
  </header>
  <main id="quiz"></main>
  <footer>
    Lab 6 BLE server and client revision quiz.
  </footer>
  <script>
    const QUESTIONS = [
  {
    "q": "Which Pico W acts as the BLE server/peripheral in this lab?",
    "options": [
      "Pico W 1",
      "Pico W 2",
      "Both Pico Ws act as servers",
      "Neither Pico W acts as a server"
    ],
    "correct": 0,
    "why": "The server code is labeled Pico W 1 - Server/Peripheral."
  },
  {
    "q": "Which Pico W acts as the BLE client/central in this lab?",
    "options": [
      "Pico W 2",
      "Pico W 1",
      "Both are beacon-only nodes",
      "Both are Wi-Fi clients only"
    ],
    "correct": 0,
    "why": "The client code is labeled Pico W 2 - Client/Central."
  },
  {
    "q": "Which custom UUID is used for the LED characteristic in this lab?",
    "options": [
      "0x1A00",
      "0x1A01",
      "0x1A02",
      "0x180F"
    ],
    "correct": 0,
    "why": "The server and client both use 0x1A00 for the LED characteristic."
  },
  {
    "q": "Which custom UUID is used for the Status characteristic in this lab?",
    "options": [
      "0x1A01",
      "0x1A00",
      "0x1A02",
      "0x2A19"
    ],
    "correct": 0,
    "why": "The server and client both use 0x1A01 for the Status characteristic."
  },
  {
    "q": "Which custom UUID identifies the BLE service in this lab?",
    "options": [
      "0x1A02",
      "0x1A01",
      "0x1A00",
      "0x181A"
    ],
    "correct": 0,
    "why": "The server and client both use 0x1A02 as the service UUID."
  },
  {
    "q": "Which advertised device name must the client find before attempting a connection?",
    "options": [
      "PicoW_A_Server_yxjk",
      "PicoW_A_Server",
      "PicoW_B_Client",
      "BLE_Lab_Node"
    ],
    "correct": 0,
    "why": "The server advertises as PicoW_A_Server_yxjk and the client TARGET_NAME uses the same name."
  },
  {
    "q": "What advertising interval constant is used on the server?",
    "options": [

      "50000 microseconds",
      "10000 microseconds",

    ],
    "correct": 0,
    "why": "The server sets _ADV_INTERVAL_US = 200000."
  },
  {
    "q": "Which ADC channel does the server use for the Pico W internal temperature sensor?",
    "options": [
      "ADC(4)",
      "ADC(0)",
      "ADC(1)",
      "ADC(3)"
    ],
    "correct": 0,
    "why": "The server code sets temp_sensor = machine.ADC(4)."
  },
  {
    "q": "What kind of string does read_pico_status() return on the server?",
    "options": [
      "A formatted temperature and voltage string",
      "Only the MAC address",
      "Only the LED state",
      "A JSON dictionary"
    ],
    "correct": 0,
    "why": "The function returns a string formatted like T:<temp>V:<volt>."
  },
  {
    "q": "What permissions are assigned to the server LED characteristic?",
    "options": [
      "READ and WRITE",
      "READ and NOTIFY",
      "WRITE and NOTIFY",
      "INDICATE only"
    ],
    "correct": 0,
    "why": "The server creates _LED_CHAR with bluetooth.FLAG_READ | bluetooth.FLAG_WRITE."
  },
  {
    "q": "What permissions are assigned to the server Status characteristic?",
    "options": [
      "READ and NOTIFY",
      "READ and WRITE",
      "WRITE only",
      "INDICATE only"
    ],
    "correct": 0,
    "why": "The server creates _STATUS_CHAR with bluetooth.FLAG_READ | bluetooth.FLAG_NOTIFY."
  },
  {
    "q": "What data structure does the server use to track active BLE connections?",
    "options": [
      "A set",
      "A list",
      "A tuple",
      "A string"
    ],
    "correct": 0,
    "why": "The server initializes self._connections = set()."
  },
  {
    "q": "How does the server convert a written LED value before applying it?",
    "options": [
      "It reads bytes, decodes them to text, and converts the result to int",
      "It parses a JSON object",
      "It converts the value to float",
      "It treats the bytes as raw RSSI"
    ],
    "correct": 0,
    "why": "The server uses self._ble.gatts_read(value_handle), then int(data.decode())."
  },
  {
    "q": "What extra action does server.update_status(notify=True) perform?",
    "options": [
      "It sends notifications on the status handle to connected clients",
      "It forces every client to disconnect",
      "It changes the advertised name",
      "It starts scanning for other devices"
    ],
    "correct": 0,
    "why": "When notify=True, the server loops through connections and calls gatts_notify(conn_handle, self._status_handle)."
  },
  {
    "q": "How does the server simulate Button A in check_button_a()?",
    "options": [
      "By returning true when ticks_ms() % 10000 < 50",
      "By reading GP20",
      "By reading GP21",
      "By using a hardware interrupt on the LED pin"
    ],
    "correct": 0,
    "why": "check_button_a() returns time.ticks_ms() % 10000 < 50."
  },
  {
    "q": "What delay is used at the end of each server loop iteration?",
    "options": [
      "100 ms",
      "50 ms",
      "500 ms",
      "10 s"
    ],
    "correct": 0,
    "why": "The server loop ends with time.sleep_ms(100)."
  },
  {
    "q": "Which GPIO pins are used for Button A and Button B on the client?",
    "options": [
      "GP20 and GP21",
      "GP0 and GP1",
      "GP14 and GP15",
      "GP26 and GP27"
    ],
    "correct": 0,
    "why": "The client maps btn_a to GP20 and btn_b to GP21."
  },
  {
    "q": "How are the client buttons configured?",
    "options": [
      "As inputs with pull-up resistors",
      "As analog inputs",
      "As PWM outputs",
      "As open-drain outputs"
    ],
    "correct": 0,
    "why": "Both buttons are created with machine.Pin.IN and machine.Pin.PULL_UP."
  },
  {
    "q": "Which helper method walks through advertising data to decode the device name on the client?",
    "options": [
      "_decode_name()",
      "scan()",
      "read_led()",
      "write_led()"
    ],
    "correct": 0,
    "why": "The client defines _decode_name(self, adv_data) for that purpose."
  },
  {
    "q": "Which AD types does _decode_name() treat as local-name fields?",
    "options": [
      "0x08 and 0x09",
      "0x01 and 0x06",
      "0x16 and 0xFF",
      "0x02 and 0x03"
    ],
    "correct": 0,
    "why": "The helper checks for AD type 0x08 and 0x09."
  },
  {
    "q": "What does the client do immediately after a target-name match is found during scanning?",
    "options": [
      "Stores address info, stops scanning, and calls gap_connect()",
      "Starts advertising as a peripheral",
      "Writes to the LED characteristic without connecting",
      "Reboots the board"
    ],
    "correct": 0,
    "why": "The client stores addr_type and addr, calls gap_scan(None), and then calls gap_connect()."
  },
  {
    "q": "What argument does client.scan() pass to gap_scan()?",
    "options": [
      "0",
      "None",
      "50",
      "500"
    ],
    "correct": 0,
    "why": "The client scan() method calls self._ble.gap_scan(0)."
  },
  {
    "q": "When does client.read_led() attempt a gattc_read()?",
    "options": [
      "Only when both self._conn_handle and self._led_handle are truthy",
      "On every loop iteration",
      "Only before scanning starts",
      "Only after a status notification arrives"
    ],
    "correct": 0,
    "why": "read_led() is guarded by if self._conn_handle and self._led_handle."
  },
  {
    "q": "How does client.write_led(state) prepare the value before writing?",
    "options": [
      "It converts the state to a string and encodes it as UTF-8 bytes",
      "It packs the state as a float",
      "It converts the state to JSON",
      "It sends the raw Python integer object"
    ],
    "correct": 0,
    "why": "write_led() uses str(state).encode('utf-8')."
  },
  {
    "q": "What does the client do in _IRQ_GATTC_NOTIFY when the value handle matches the status handle?",
    "options": [
      "Decodes the bytes as UTF-8 and prints the server status text",
      "Treats the bytes as an RSSI sample",
      "Starts a new BLE scan",
      "Turns off the onboard LED permanently"
    ],
    "correct": 0,
    "why": "The notify branch decodes value.decode('utf-8') and prints the resulting status string."
  },
  {
    "q": "How is state_to_write computed when Button B is pressed on the client?",
    "options": [
      "1 - onboard_led.value()",
      "onboard_led.value() + 1",
      "btn_b.value() * 2",
      "time.ticks_ms() // 1000"
    ],
    "correct": 0,
    "why": "The client computes state_to_write = 1 - onboard_led.value()."
  },
  {
    "q": "What debounce threshold does the client use for button actions?",
    "options": [
      "More than 500 ms since the last action",
      "More than 50 ms since the last action",
      "Exactly 10 seconds since boot",
      "No debounce is used"
    ],
    "correct": 0,
    "why": "Both button branches check whether time.ticks_ms() - last_action_time > 500."
  },
  {
    "q": "What delay is used at the end of each client loop iteration?",
    "options": [
      "50 ms",
      "100 ms",
      "500 ms",
      "10 s"
    ],
    "correct": 0,
    "why": "The client loop ends with time.sleep_ms(50)."
  },
  {
    "q": "Which client-side event is intended to receive server status notifications?",
    "options": [
      "_IRQ_GATTC_NOTIFY",
      "_IRQ_SCAN_DONE",
      "_IRQ_GATTS_WRITE",
      "_IRQ_CENTRAL_DISCONNECT"
    ],
    "correct": 0,
    "why": "The client handles status notifications in the _IRQ_GATTC_NOTIFY branch."
  },
  {
    "q": "Which server-side action produces those status notifications?",
    "options": [
      "Calling update_status(notify=True)",
      "Calling gap_scan(0)",
      "Reading the LED characteristic only",
      "Creating btn_a and btn_b"
    ],
    "correct": 0,
    "why": "The server sends notifications when update_status is called with notify=True."
  },
  {
    "q": "What limitation is explicitly stated in the client code comments?",
    "options": [
      "Some IRQ handlers are omitted for brevity",
      "The code has no BLE scanning support",
      "The code is beacon-only",
      "The code has no button handling"
    ],
    "correct": 0,
    "why": "A comment in the client code says other IRQ handlers are omitted for brevity."
  },
  {
    "q": "Which extra module is imported by the server file for MAC-address formatting?",
    "options": [
      "ubinascii",
      "json",
      "ssl",
      "socket"
    ],
    "correct": 0,
    "why": "The server file imports ubinascii near the top and uses it inside get_mac()."
  },
  {
    "q": "Which module is imported inside the server get_mac() function?",
    "options": [
      "network",
      "struct",
      "math",
      "select"
    ],
    "correct": 0,
    "why": "The get_mac() function contains an inner import network statement."
  },
  {
    "q": "Which server IRQ constant is assigned const(1)?",
    "options": [
      "_IRQ_CENTRAL_CONNECT",
      "_IRQ_CENTRAL_DISCONNECT",
      "_IRQ_GATTS_WRITE",
      "_IRQ_GATTC_NOTIFY"
    ],
    "correct": 0,
    "why": "The server defines _IRQ_CENTRAL_CONNECT = const(1)."
  },
  {
    "q": "Which server IRQ constant is assigned const(2)?",
    "options": [
      "_IRQ_CENTRAL_DISCONNECT",
      "_IRQ_CENTRAL_CONNECT",
      "_IRQ_GATTS_WRITE",
      "_IRQ_SCAN_DONE"
    ],
    "correct": 0,
    "why": "The server defines _IRQ_CENTRAL_DISCONNECT = const(2)."
  },
  {
    "q": "Which server IRQ constant is assigned const(3)?",
    "options": [
      "_IRQ_GATTS_WRITE",
      "_IRQ_CENTRAL_CONNECT",
      "_IRQ_CENTRAL_DISCONNECT",
      "_IRQ_GATTC_READ_DONE"
    ],
    "correct": 0,
    "why": "The server defines _IRQ_GATTS_WRITE = const(3)."
  },
  {
    "q": "What message does the server print when a client connects?",
    "options": [
      "Client Connected.",
      "Scan complete",
      "Found Server. Connecting...",
      "Write successful"
    ],
    "correct": 0,
    "why": "In the _IRQ_CENTRAL_CONNECT branch, the server prints Client Connected."
  },
  {
    "q": "What message does the server print when a client disconnects?",
    "options": [
      "Client Disconnected. Advertising...",
      "Scan complete",
      "Client Button A pressed",
      "Pico W MAC Address"
    ],
    "correct": 0,
    "why": "In the _IRQ_CENTRAL_DISCONNECT branch, the server prints Client Disconnected. Advertising..."
  },
  {
    "q": "What message pattern does the server print after handling a client LED write?",
    "options": [
      "LED state set to: <new_state>",
      "LED toggled from RSSI",
      "Status written to flash",
      "Peripheral discovery complete"
    ],
    "correct": 0,
    "why": "After decoding the written value, the server prints LED state set to: followed by the new state."
  },
  {
    "q": "Which client IRQ constant is assigned const(5)?",
    "options": [
      "_IRQ_SCAN_RESULT",
      "_IRQ_SCAN_DONE",
      "_IRQ_GATTC_READ_DONE",
      "_IRQ_GATTC_NOTIFY"
    ],
    "correct": 0,
    "why": "The client defines _IRQ_SCAN_RESULT = const(5)."
  },
  {
    "q": "Which client IRQ constant is assigned const(6)?",
    "options": [
      "_IRQ_SCAN_DONE",
      "_IRQ_SCAN_RESULT",
      "_IRQ_GATTC_READ_DONE",
      "_IRQ_GATTC_NOTIFY"
    ],
    "correct": 0,
    "why": "The client defines _IRQ_SCAN_DONE = const(6)."
  },
  {
    "q": "Which client IRQ constant is assigned const(15)?",
    "options": [
      "_IRQ_GATTC_READ_DONE",
      "_IRQ_GATTC_NOTIFY",
      "_IRQ_SCAN_DONE",
      "_IRQ_SCAN_RESULT"
    ],
    "correct": 0,
    "why": "The client defines _IRQ_GATTC_READ_DONE = const(15)."
  },
  {
    "q": "Which client IRQ constant is assigned const(18)?",
    "options": [
      "_IRQ_GATTC_NOTIFY",
      "_IRQ_GATTC_READ_DONE",
      "_IRQ_SCAN_DONE",
      "_IRQ_SCAN_RESULT"
    ],
    "correct": 0,
    "why": "The client defines _IRQ_GATTC_NOTIFY = const(18)."
  },
  {
    "q": "Which fields are shown in the client's named scan-result debug print?",
    "options": [
      "Address, RSSI, and decoded name",
      "Temperature, voltage, and GPIO pin",
      "Only the device name",
      "Only the service UUID"
    ],
    "correct": 0,
    "why": "The print statement includes bytes(addr).hex(), rssi, and the decoded device name."
  },
  {
    "q": "What is the purpose of the client _reset() method?",
    "options": [
      "To initialize connection, address, and characteristic-handle state to None",
      "To erase the quiz score",
      "To stop server advertising",
      "To calibrate the temperature sensor"
    ],
    "correct": 0,
    "why": "The _reset() method initializes connection, address, and characteristic-handle state to None."
  }
];
    const quizEl = document.getElementById('quiz');
    const scoreEl = document.getElementById('score');
    const progressEl = document.getElementById('progress');
    const percentEl = document.getElementById('percent');
    const resetBtn = document.getElementById('resetBtn');
    const revealBtn = document.getElementById('revealBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    let state = { score: 0, answered: 0 };
    let currentQuestions = [];
    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }
    function buildQuestions() {
      return shuffle(QUESTIONS).map(q => (({
        q: q.q,
        options: shuffle(q.options.map((txt, i) => ({ txt, isCorrect: i === q.correct }))),
        correct: 0,
        why: q.why,
        __answered: false
      }))).map(item => {
        item.correct = item.options.findIndex(o => o.isCorrect);
        item.options = item.options.map(o => o.txt);
        return item;
      });
    }
    function render() {
      quizEl.innerHTML = '';
      currentQuestions.forEach((item, qi) => {
        const card = document.createElement('div');
        card.className = 'qcard';
        const head = document.createElement('div');
        head.className = 'qhead';
        const titleEl = document.createElement('p');
        titleEl.className = 'qtitle';
        titleEl.innerHTML = `${qi + 1}. ${item.q}`;
        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = `Q${qi + 1}`;
        head.appendChild(titleEl);
        head.appendChild(badge);
        card.appendChild(head);
        const opts = document.createElement('div');
        opts.className = 'opts';
        item.options.forEach((opt, oi) => {
          const row = document.createElement('div');
          row.className = 'opt';
          row.setAttribute('data-q', qi);
          row.setAttribute('data-o', oi);
          const letter = document.createElement('div');
          letter.className = 'letter';
          letter.textContent = String.fromCharCode(65 + oi);
          const span = document.createElement('span');
          span.innerHTML = opt;
          row.appendChild(letter);
          row.appendChild(span);
          row.addEventListener('click', onChoose);
          opts.appendChild(row);
        });
        const exp = document.createElement('div');
        exp.className = 'exp';
        exp.hidden = true;
        exp.innerHTML = `<strong>Explanation:</strong> ${item.why}`;
        card.appendChild(opts);
        card.appendChild(exp);
        quizEl.appendChild(card);
      });
      updateStats();
    }
    function onChoose(e) {
      const btn = e.currentTarget;
      const qIndex = +btn.getAttribute('data-q');
      const oIndex = +btn.getAttribute('data-o');
      const card = btn.closest('.qcard');
      const exp = card.querySelector('.exp');
      const data = currentQuestions[qIndex];
      if (data.__answered) return;
      const options = card.querySelectorAll('.opt');
      options.forEach(b => b.classList.add('disabled'));
      data.__answered = true;
      state.answered++;
      if (oIndex === data.correct) {
        btn.classList.add('correct');
        state.score++;
      } else {
        btn.classList.add('wrong');
        options[data.correct].classList.add('correct');
      }
      exp.hidden = false;
      updateStats();
    }
    function updateStats() {
      scoreEl.textContent = `Score: ${state.score}`;
      progressEl.textContent = `Answered: ${state.answered} / ${currentQuestions.length}`;
      const pct = currentQuestions.length ? Math.round((state.score / currentQuestions.length) * 100) : 0;
      percentEl.textContent = `${pct}%`;
    }
    function revealAll() {
      document.querySelectorAll('.qcard').forEach((card, qi) => {
        const data = currentQuestions[qi];
        const exp = card.querySelector('.exp');
        const options = card.querySelectorAll('.opt');
        options.forEach((b, oi) => {
          b.classList.remove('wrong');
          if (oi === data.correct) b.classList.add('correct');
          b.classList.add('disabled');
        });
        data.__answered = true;
        exp.hidden = false;
      });
    }
    function resetQuiz() {
      state.score = 0;
      state.answered = 0;
      render();
    }
    function shuffleQuiz() {
      state.score = 0;
      state.answered = 0;
      currentQuestions = buildQuestions();
      render();
    }
    resetBtn.addEventListener('click', resetQuiz);
    revealBtn.addEventListener('click', revealAll);
    shuffleBtn.addEventListener('click', shuffleQuiz);
    currentQuestions = buildQuestions();
    render();
  </script>
</body>
</html>
